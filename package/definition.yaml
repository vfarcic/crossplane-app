apiVersion: apiextensions.crossplane.io/v2
kind: CompositeResourceDefinition
metadata:
  name: apps.devopstoolkit.live
spec:
  defaultCompositionRef:
    name: app-backend
  group: devopstoolkit.live
  names:
    kind: App
    plural: apps
  versions:
  - name: v1beta1
    served: true
    referenceable: true
    schema:
      openAPIV3Schema:
        type: object
        properties:
          spec:
            type: object
            properties:
              image:
                description: The container image (e.g., `ghcr.io/vfarcic/silly-demo`)
                type: string
              tag:
                description: The tag of the image (e.g., `1.2.3`)
                type: string
              port:
                description: The application port
                type: integer
                default: 80
              host:
                description: The host address of the application
                type: string
                default: devopstoolkit.live
              routing:
                description: "Routing implementation: ingress (default) or gateway-api"
                type: string
                enum:
                  - ingress
                  - gateway-api
                default: ingress
              ingressClassName:
                description: The Ingress class name
                type: string
                default: contour
              frontend:
                type: object
                description: Frontend-specific configuration
                properties:
                  backendUrl:
                    description: The URL of the backend service
                    type: string
              db:
                type: object
                properties:
                  secret:
                    description: The name of the Secret with DB authentication.
                    type: string
                  storeName:
                    description: The name of the secret store to use to pull the secret.
                    type: string
                  name:
                    description: The name of the database.
                    type: string
              minReplicas:
                description: Number of replicas when scaling is disabled, or minimum replicas when scaling is enabled (0 enables scale-to-zero with KEDA)
                type: integer
                minimum: 0
                default: 1
              maxReplicas:
                description: Maximum number of replicas (only used when scaling is enabled)
                type: integer
                default: 10
              scaling:
                type: object
                properties:
                  enabled:
                    description: Whether to enable autoscaling (generates KEDA ScaledObject with CPU/memory triggers)
                    type: boolean
                    default: false
            required:
            - image
            - tag
          status:
            type: object
            properties:
              host:
                description: The host address of the application
                type: string
    additionalPrinterColumns:
    - name: host
      type: string
      jsonPath: ".status.host"
