---
apiVersion: devopstoolkit.live/v1beta1
kind: App
metadata:
  name: backend
spec:
  db:
    storeName: google
  crossplane:
    (resourceRefs[?kind == 'Object' && name == 'backend-external-secret']):
    - apiVersion: kubernetes.m.crossplane.io/v1alpha1
      kind: Object
      name: backend-external-secret
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: backend
spec:
  dataFrom:
  - extract:
      conversionStrategy: Default
      decodingStrategy: None
      key: backend-db
      metadataPolicy: None
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: google
  target:
    creationPolicy: Owner
    deletionPolicy: Retain
    name: backend-db
