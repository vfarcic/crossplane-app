---
apiVersion: devopstoolkit.live/v1beta1
kind: App
metadata:
  name: backend
spec:
  routing: gateway-api
  minReplicas: 0
  maxReplicas: 5
  scaling:
    enabled: true
    prometheusAddress: http://kube-prometheus-stack-prometheus.prometheus-system:9090
  crossplane:
    resourceRefs:
    - apiVersion: kubernetes.m.crossplane.io/v1alpha1
      kind: Object
      name: backend-deployment
    - apiVersion: kubernetes.m.crossplane.io/v1alpha1
      kind: Object
      name: backend-http-scaled-object
    - apiVersion: kubernetes.m.crossplane.io/v1alpha1
      kind: Object
      name: backend-httproute
    - apiVersion: kubernetes.m.crossplane.io/v1alpha1
      kind: Object
      name: backend-scaled-object
    - apiVersion: kubernetes.m.crossplane.io/v1alpha1
      kind: Object
      name: backend-service
---
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: backend
  labels:
    app.kubernetes.io/name: backend
spec:
  scaleTargetRef:
    name: backend
  minReplicaCount: 0
  maxReplicaCount: 5
  triggers:
  - type: prometheus
    metadata:
      serverAddress: http://kube-prometheus-stack-prometheus.prometheus-system:9090
      query: (join('', ['sum(rate(envoy_cluster_upstream_rq_total{envoy_cluster_name=~"httproute/', $namespace, '/backend/.*"}[2m]))']))
      threshold: "100"
  - type: external-push
    metadata:
      scalerAddress: keda-add-ons-http-external-scaler.keda:9090
      httpScaledObject: backend
---
apiVersion: http.keda.sh/v1alpha1
kind: HTTPScaledObject
metadata:
  name: backend
  labels:
    app.kubernetes.io/name: backend
  annotations:
    httpscaledobject.keda.sh/skip-scaledobject-creation: "true"
spec:
  hosts:
  - silly-demo.54.204.223.4.nip.io
  scaleTargetRef:
    name: backend
    service: backend
    port: 8080
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: backend
spec:
  parentRefs:
  - name: eg
    namespace: envoy-gateway-system
  hostnames:
  - silly-demo.54.204.223.4.nip.io
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - name: keda-add-ons-http-interceptor-proxy
      namespace: keda
      port: 8080
