---
apiVersion: devopstoolkit.live/v1beta1
kind: App
metadata:
  name: backend
spec:
  scaling:
    enabled: true
    prometheusAddress: http://kube-prometheus-stack-prometheus.prometheus-system:9090
  crossplane:
    resourceRefs:
    - apiVersion: kubernetes.m.crossplane.io/v1alpha1
      kind: Object
      name: backend-deployment
    - apiVersion: kubernetes.m.crossplane.io/v1alpha1
      kind: Object
      name: backend-http-scaled-object
    - apiVersion: kubernetes.m.crossplane.io/v1alpha1
      kind: Object
      name: backend-httproute
    - apiVersion: kubernetes.m.crossplane.io/v1alpha1
      kind: Object
      name: backend-reference-grant
    - apiVersion: kubernetes.m.crossplane.io/v1alpha1
      kind: Object
      name: backend-scaled-object
    - apiVersion: kubernetes.m.crossplane.io/v1alpha1
      kind: Object
      name: backend-service
---
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: backend
(spec.triggers[?type == 'prometheus']):
- metadata:
    serverAddress: http://kube-prometheus-stack-prometheus.prometheus-system:9090
