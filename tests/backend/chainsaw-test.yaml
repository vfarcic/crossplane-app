apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: backend
spec:
  template: true
  timeouts:
    assert: 120s
  bindings:
    - name: name
      value: backend
    - name: type
      value: backend
  steps:
    - try:
        - apply:
            file: ../common/install.yaml
        - assert:
            file: ../common/assert-install.yaml
        - assert:
            file: assert-install.yaml
        - patch:
            file: scaling.yaml
        - assert:
            file: assert-scaling.yaml
        - patch:
            file: pull-secret.yaml
        - assert:
            file: assert-pull-secret.yaml
      catch:
        - script:
            content: kubectl describe app backend --namespace $NAMESPACE
        - script:
            content: kubectl get managed
        - script:
            content: kubectl get all,ingress --namespace $NAMESPACE
      finally:
        - script:
            timeout: 120s
            content: |
              kubectl delete apps.devopstoolkit.live backend -n $NAMESPACE --ignore-not-found
              while kubectl get objects.kubernetes.m.crossplane.io -n $NAMESPACE --no-headers 2>/dev/null | grep -q .; do
                sleep 2
              done
