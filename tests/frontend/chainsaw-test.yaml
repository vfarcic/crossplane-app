apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: frontend
spec:
  template: true
  bindings:
    - name: name
      value: frontend
    - name: type
      value: backend
  steps:
    - try:
        - apply:
            file: install.yaml
        - assert:
            file: ../common/assert-install.yaml
        - assert:
            file: assert-install.yaml
      catch:
        - script:
            content: kubectl describe app frontend --namespace $NAMESPACE
        - script:
            content: kubectl get managed
        - script:
            content: kubectl get all,ingress --namespace $NAMESPACE
      finally:
        - script:
            timeout: 120s
            content: |
              kubectl delete apps.devopstoolkit.live frontend -n $NAMESPACE --ignore-not-found
              while kubectl get objects.kubernetes.m.crossplane.io -n $NAMESPACE --no-headers 2>/dev/null | grep -q .; do
                sleep 2
              done
